{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-12 mb-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4 fw-bold">Как прошёл ваш день, {{ current_user.username }}?</h4>
                <form method="POST" action="/add" enctype="multipart/form-data">
                    
                    <div class="mb-4 text-center">
                        <label class="form-label fw-semibold text-muted">Главное настроение</label><br>
                        {% for i in range(1, 6) %}
                            <button type="button" class="btn btn-outline-primary mood-btn mx-1 fs-3 rounded-circle p-2" data-value="{{ i }}">
                                {{ emojis[i] }}
                            </button>
                        {% endfor %}
                        <input type="hidden" name="level" id="levelInput" required>
                    </div>

                    <div class="row bg-body-tertiary p-3 rounded-3 mb-4">
                        <div class="col-md-4 mb-3 mb-md-0">
                            <label class="form-label fw-medium">🔋 Уровень энергии</label>
                            <input type="range" class="form-range" name="energy" min="1" max="5" step="1" value="3">
                            <div class="d-flex justify-content-between text-muted small"><span>Мало</span><span>Много</span></div>
                        </div>
                        <div class="col-md-4 mb-3 mb-md-0">
                            <label class="form-label fw-medium">🌪️ Уровень стресса</label>
                            <input type="range" class="form-range" name="stress" min="1" max="5" step="1" value="3">
                            <div class="d-flex justify-content-between text-muted small"><span>Низкий</span><span>Высокий</span></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-medium">💤 Качество сна</label>
                            <input type="range" class="form-range" name="sleep" min="1" max="5" step="1" value="3">
                            <div class="d-flex justify-content-between text-muted small"><span>Плохо</span><span>Отлично</span></div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <textarea name="note" class="form-control" rows="2" placeholder="Заметки о сегодняшнем дне (по желанию)..."></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted small">Прикрепить фото</label>
                        <input type="file" class="form-control form-control-sm" name="image" accept="image/png, image/jpeg, image/gif, image/webp">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-3">Сохранить запись</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const buttons = document.querySelectorAll('.mood-btn');
    const input = document.getElementById('levelInput');
    
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            input.value = btn.dataset.value;
        });
    });
</script>

<style>
    .mood-btn { transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent;}
    .mood-btn.active { transform: scale(1.1); border-color: var(--bs-primary); background-color: var(--bs-primary-bg-subtle); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .mood-btn:hover { transform: scale(1.1); }
</style>
{% endblock %}
